#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "journiv"
name = "Journiv"
description.en = "Self hosted private journaling"
description.fr = "Journal intime privé auto-hébergé"

version = "0.1.0~ynh2"

maintainers = ["eric_G"]

[upstream]
license = "PolyForm-Noncommercial-1.0.0"
website = "https://www.journiv.com/"
admindoc = "https://www.journiv.com/docs/installation"
code = "https://github.com/journiv/journiv-app"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/journiv/journiv-app/archive/refs/tags/v0.1.0-beta.14.tar.gz"
    sha256 = "35700843930261c5e6bf729bbc43917f5d714751d66f0bc2e708af181f2b4cce"
    
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql, postgresql-contrib, python3-dev, python3-venv, python3, python3-pip, redis-server"

    [resources.database]
    type = "postgresql"
